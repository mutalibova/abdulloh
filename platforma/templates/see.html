<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profi</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body {
      background:#f5f5f5;
      margin:0;
      font-family: Arial, sans-serif;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      height:65px;
      background:white;
      border-top:1px solid #e2e8f0;
      display:flex;
      justify-content:space-around;
      align-items:center;
      z-index:40;
    }

    .bottom-nav a{
      display:flex;
      flex-direction:column;
      align-items:center;
      font-size:17px;
      color:#94a3b8;
      text-decoration:none;
    }

    .bottom-nav a.active{
      color:#2563eb;
    }


    .add-btn{
      position:fixed;
      bottom:85px;
      right:20px;
      width:55px;
      height:55px;
      background:#2563eb;
      color:white;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
      z-index:50;
    }

  
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.4);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:60;
    }

    .modal-box{
      background:white;
      width:90%;
      max-width:350px;
      border-radius:12px;
      padding:20px;
    }
  </style>
</head>
<body>

  <div class="p-5 pb-32">
    <h2 class="text-lg font-bold mb-3">Profil ma’lumotlari</h2>

    <div id="dataList" class="space-y-3 text-sm text-gray-700">
      <p class="text-gray-400">Hozircha ma’lumot yo‘q</p>
    </div>
  </div>

  <div class="add-btn" onclick="openModal()">
    <i class="fa-solid fa-plus"></i>
  </div>

  
  <div id="modal" class="modal">
    <div class="modal-box">
      <h3 class="font-semibold mb-3">Ma’lumot qo‘shish</h3>

      <input id="inputText" type="text" placeholder="Masalan: Backend dasturchi"
        class="w-full border rounded-lg p-2 mb-3 outline-none"/>

      <div class="flex justify-end gap-2">
        <button onclick="closeModal()" class="px-4 py-2 text-sm">Bekor</button>
        <button onclick="saveData()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">
          Saqlash
        </button>
      </div>
    </div>
  </div>


  <nav class="bottom-nav">
    <a href="{% url 'index' %}" class="active">
      <i class="fa-solid fa-briefcase"></i>
      <span>Ishlar</span>
    </a>

    <a href="{% url 'acaunt' %}">
      <i class="fa-solid fa-user-tie"></i>
      <span>Profi</span>
    </a>

    <a href="{% url 'haqida' %}">
      <i class="fa-solid fa-circle-info"></i>
      <span>turi</span>
    </a>

    <a href="{% url 'about' %}">
      <i class="fa-solid fa-circle-question"></i>
      <span>Yordam</span>
    </a>
  </nav>


  <script>
    const modal = document.getElementById("modal");
    const input = document.getElementById("inputText");
    const list = document.getElementById("dataList");

    function openModal(){
      modal.style.display = "flex";
      input.value = "";
    }

    function closeModal(){
      modal.style.display = "none";
    }

    function saveData(){
      if(input.value.trim() === "") return;

      if(list.children[0]?.classList.contains("text-gray-400")){
        list.innerHTML = "";
      }

      const div = document.createElement("div");
      div.className = "bg-white p-3 rounded-lg shadow text-gray-800";
      div.textContent = input.value;

      list.appendChild(div);
      closeModal();
    }
  </script>

</body>
</html>
