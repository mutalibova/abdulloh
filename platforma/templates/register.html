<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workmate Ro'yxatdan o'tish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f0f4f8] flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-[340px] bg-white rounded-[30px] p-8 shadow-xl shadow-blue-900/5 border border-white">
        
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-200">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
            </svg>
        </div>

        <h2 class="text-2xl font-800 text-center text-slate-800 mb-2 tracking-tight">Ro'yxatdan o'tish</h2>
        <p class="text-gray-400 text-sm text-center mb-8">Workmate oilasiga qo'shiling</p>

        {% if error %}
            <div class="bg-red-50 text-red-500 text-xs p-3 rounded-xl mb-6 border border-red-100 flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="relative">
                <input type="text" name="name" placeholder="To'liq ismingiz" required
                    class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all text-sm font-medium">
            </div>

            <div class="relative">
                <input type="email" name="email" placeholder="Email manzilingiz" required
                    class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all text-sm font-medium">
            </div>

            <div class="relative">
                <input type="password" name="code" placeholder="Parol yarating" required
                    class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all text-sm font-medium">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-700 py-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-[0.98] transition-all mt-2">
                Ro'yxatdan o'tish
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-gray-400 text-xs">
                Profilingiz bormi? 
                <a href="{% url 'login' %}" class="text-blue-600 font-700 ml-1 hover:underline">Kirish</a>
            </p>
        </div>
    </div>

</body>
</html>
