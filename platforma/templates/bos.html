<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workmate</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #f0f4f2;
    margin: 0;
    padding: 0;
}


.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background-color: #ffffff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.navbar input {
    width: 500px;
    height: 40px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    padding-left: 15px;
}

.navbar button {
    background-color: #4CAF50;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}
.navbar button:hover {
    background-color: #45a049;
}


.banner-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin: 30px auto;
    max-width: 1200px;
}

.banner-large {
    flex: 1 1 720px;
    height: 300px;
    border-radius: 15px;
    background-image: url('/static/banner-width-720.webp');
    background-size: cover;
    background-position: center;
    transition: transform 0.3s, box-shadow 0.3s;
}
.banner-large:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(76, 175, 80, 0.3);
}

.banner-small {
    flex: 1 1 320px;
    height: 300px;
    border-radius: 15px;
    background-size: cover;
    background-position: center;
    transition: transform 0.3s, box-shadow 0.3s;
}
.banner-small:nth-child(2) {
    background-image: url('/static/banner-width-640.webp');
}
.banner-small:nth-child(3) {
    background-image: url('/static/banner-width-640-1.webp');
}
.banner-small:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(76, 175, 80, 0.25);
}

.job-card {
    background-color: #e6f4ea;
    border-radius: 12px;
    padding: 20px;
    width: 280px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: transform 0.3s;
}
.job-card:hover {
    transform: translateY(-5px);
}


h4 {
    color: #333;
    font-size: 16px;
}
h4:hover {
    color: #4CAF50;
}
p {
    color: #555;
    font-size: 14px;
}
p:hover {
    color: #4CAF50;
}


@media (max-width: 1024px) {
    .banner-large {
        flex: 1 1 100%;
    }
    .banner-small {
        flex: 1 1 48%;
    }
}
@media (max-width: 640px) {
    .banner-small {
        flex: 1 1 100%;
    }
    .navbar input {
        width: 100%;
        margin-top: 10px;
    }
}
</style>
</head>
<body>


<div class="navbar">
    <div class="logo">
        <h1 class="text-xl font-bold text-green-600">Workmate</h1>
    </div>
    <input type="text" placeholder="Ish qidirish...">
    <button>Topish</button>
</div>


<div class="banner-container">
    <div class="banner-large"></div>
    <div class="banner-small"></div>
    <div class="banner-small"></div>
</div>


<div class="job-list flex flex-wrap justify-center gap-5 mt-10">
    <div class="job-card">
        <h4>Ish nomi: Dasturchi</h4>
        <p>Ish beruvchi: Workmate Tech</p>
        <p>Joylashuv: Toshkent</p>
    </div>
    <div class="job-card">
        <h4>Ish nomi: Dizayner</h4>
        <p>Ish beruvchi: Creative Studio</p>
        <p>Joylashuv: Toshkent</p>
    </div>
    <div class="job-card">
        <h4>Ish nomi: Ofis boshqaruvchisi</h4>
        <p>Ish beruvchi: Office Co</p>
        <p>Joylashuv: Toshkent</p>
    </div>
</div>

</body>
</html>
